mongo:
  database:
    - name: "enterprise-production-docdb"
      engine_version: "5.0.0"
      port: 27017
      db_subnet_group_name: "enterprise-production-database-subnet-groups"
      vpc_security_group_ids:
        - "sg-xxxxxxxxxxxxxxxxx"
      backup_retention_period: 1
      preferred_backup_window: "00:00-00:30"
      preferred_maintenance_window: "sun:02:30-sun:03:00"
      deletion_protection: true
      storage_encrypted: true
      kms_key_id: "arn:aws:kms:eu-west-2:111122223333:key/xxxx-xxxx-xxxx"
      skip_final_snapshot: true
      storage_type: "iopt1"
      instances:
        - identifier: "enterprise-production-docdb-01"
          instance_class: "db.r5.2xlarge"
          promotion_tier: 1
          tags:
            teleport: "discover"
        - identifier: "enterprise-production-docdb-02"
          instance_class: "db.r5.2xlarge"
          promotion_tier: 1
  
